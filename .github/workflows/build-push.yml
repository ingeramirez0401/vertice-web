name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:  # permite lanzarlo manualmente desde GitHub UI

env:
  IMAGE: ghcr.io/ingeramirez0401/vertice-web

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # necesario para subir a ghcr.io con GITHUB_TOKEN

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_BRAND_NAME=${{ secrets.NEXT_PUBLIC_BRAND_NAME }}
            NEXT_PUBLIC_REGION_LABEL=${{ secrets.NEXT_PUBLIC_REGION_LABEL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Opcional: dispara el redeploy automático en Portainer
      # Actívalo cuando hayas configurado el webhook (ver instrucciones abajo)
      # - name: Redeploy en Portainer
      #   run: |
      #     curl -s -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
